name: keep-alive

# Keeps the Render service warm during waking hours so visitors from Google
# don't land on a 30-60s cold start.
#
# Why it's on a schedule rather than 24/7:
#
# Render gives 750 free instance-hours per WORKSPACE per calendar month. A
# service kept awake round the clock burns ~744 of them in a 31-day month --
# it fits, but with only six hours to spare, which is too thin to be safe.
#
# Pinging 06:00-23:59 UTC keeps it awake roughly 18 hours a day (~560 hours a
# month), leaving a comfortable margin. The site is instant while people are
# actually browsing and only sleeps overnight.
#
# This is affordable now because quickvidsave is the ONLY service left in the
# Render workspace -- flatroutes.com moved to Cloudflare. If another service is
# ever added here, redo this sum before trusting it.
#
# Bandwidth is not a concern: a ping is ~10KB, so a month of them is ~35MB
# against the 5GB cap. (The thing that actually blew that cap was proxying video
# bytes, which the server no longer does -- see server.js.)
#
# GitHub's scheduled runs can be delayed under load, so each run pings twice
# (about 5 minutes apart) to widen coverage between scheduled runs.

on:
  schedule:
    - cron: "*/10 6-23 * * *" # every 10 min, 06:00-23:59 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

# If a run is still going when the next fires, let the newer one proceed.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping the site
        run: |
          ping_once () {
            echo "Ping at $(date -u)"
            if curl -fsS --retry 3 --retry-delay 5 --max-time 60 -o /dev/null "https://quickvidsave.com/"; then
              echo "  ok"
            else
              echo "  ping failed (next run will retry)"
            fi
          }
          ping_once
          sleep 300
          ping_once
