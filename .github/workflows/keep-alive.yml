name: keep-alive

# DISABLED. Do not re-enable on Render's free tier.
#
# This used to ping the site every 10 minutes so Render wouldn't spin the server
# down after 15 minutes idle. It worked -- and that was the problem. Render's
# free tier allows 750 instance-hours per WORKSPACE per calendar month, and a
# service that never sleeps burns ~720 of them by itself. Running this alongside
# a second free service blew the account past the cap, and Render suspends ALL
# free web services for the rest of the month when that happens.
#
# Cold starts (~30-60s for the first visitor) are the price of the free tier.
# Being suspended is worse than being slow.

on:
  workflow_dispatch: {} # manual only -- the schedule is intentionally gone

# If a run is still going when the next fires, let the newer one proceed.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping the site
        run: |
          ping_once () {
            echo "Ping at $(date -u)"
            if curl -fsS --retry 3 --retry-delay 5 --max-time 60 -o /dev/null "https://quickvidsave.com/"; then
              echo "  ok"
            else
              echo "  ping failed (next run will retry)"
            fi
          }
          ping_once
          sleep 300
          ping_once
